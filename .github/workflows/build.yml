name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libclang-dev \
            llvm-dev \
            libclang1 \
            clang \
            pkg-config

      - name: Find libclang path
        run: |
          find /usr -name "libclang.so*" 2>/dev/null | head -5
          dpkg -L libclang1 | grep \\.so
          ls -la /usr/lib/llvm*/lib/libclang.so* 2>/dev/null || true
          ls -la /usr/lib/x86_64-linux-gnu/libclang.so* 2>/dev/null || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release
        env:
          LIBCLANG_PATH: /usr/lib/x86_64-linux-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-face-recognition-linux
          path: |
            target/release/rtsp_face_recognition
            target/release/face_detection

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-opencv4-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-opencv4-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install OpenCV via vcpkg
        run: |
          vcpkg integrate install
          vcpkg install opencv4[core,dnn,ffmpeg]:x64-windows-release

      - name: Build
        run: cargo build --release
        env:
          VCPKG_ROOT: C:/vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-release
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-face-recognition-windows
          path: |
            target/release/rtsp_face_recognition.exe
            target/release/face_detection.exe

  build-windows-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            g++-mingw-w64-x86-64 \
            libclang-dev \
            llvm-dev \
            libclang1 \
            clang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-windows-gnu

      - name: Download OpenCV MinGW
        run: |
          wget -q https://github.com/huihut/OpenCV-MinGW-Build/archive/refs/tags/OpenCV-4.5.5-x64.zip -O opencv.zip
          unzip -q opencv.zip
          sudo mv OpenCV-MinGW-Build-OpenCV-4.5.5-x64 /opt/opencv-win

      - name: Build for Windows (cross-compile)
        run: cargo build --release --target x86_64-pc-windows-gnu
        env:
          LIBCLANG_PATH: /usr/lib/x86_64-linux-gnu
          OPENCV_LINK_LIBS: "opencv_world455,opencv_videoio_ffmpeg455_64,libopenh264"
          OPENCV_LINK_PATHS: "/opt/opencv-win/x64/mingw/lib"
          OPENCV_INCLUDE_PATHS: "/opt/opencv-win/include"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-face-recognition-windows-cross
          path: |
            target/x86_64-pc-windows-gnu/release/rtsp_face_recognition.exe
            target/x86_64-pc-windows-gnu/release/face_detection.exe
