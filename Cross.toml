# Cross 编译工具配置
# 使用: cargo install cross
#      cross build --target x86_64-pc-windows-gnu

[target.x86_64-pc-windows-gnu]
image = "ghcr.io/cross-rs/cross:x86_64-pc-windows-gnu"

# 使用自定义 Docker 镜像（包含 OpenCV）
# image = "opencv-mingw:latest"

# 挂载额外的卷
# volumes = ["/opt/opencv-win:/opt/opencv-win"]

# 环境变量
# env.passthrough = ["OPENCV_LINK_LIBS", "OPENCV_LINK_PATHS", "OPENCV_INCLUDE_PATHS"]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/cross:x86_64-unknown-linux-gnu"
